<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narnialytics</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <section name="details">
        <div id="detail_name">Select a player</div>
        <div id="player_details">
            <div class="stat">
                <span>Wins</span>
                <span id="detail_wins">--</span>
            </div>

            <div class="stat">
                <span>Defeats</span>
                <span id="detail_defeats">--</span>
            </div>

            <div class="stat">
                <span>Kills</span>
                <span id="detail_kills">--</span>
            </div>

            <div class="stat">
                <span>Deaths</span>
                <span id="detail_deaths">--</span>
            </div>
            
            <div class="stat">
                <span>Assists</span>
                <span id="detail_assists">--</span>
            </div>

            
            <div class="stat">
                <span>KDA</span>
                <span id="detail_kda">--</span>
            </div>
        </div> <!--player_details-->
    </section><!--section details-->

    <div id="players_ranking">
        <table class="players_table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Defeats</th>
                </tr>
            </thead>
            <tbody id="players_list">
                
            </tbody>
        </table><!--players_table-->
    </div><!--players_ranking-->

    <script type="module" src="./js/main.js"></script>
</body>
</html>
